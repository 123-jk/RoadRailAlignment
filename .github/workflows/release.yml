name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Download JOSM tested jar
        run: |
          mkdir -p lib
          curl -fsSL https://josm.openstreetmap.de/josm-tested.jar -o lib/josm-tested.jar

      - name: Build plugin
        run: mvn -B package

      - name: Run geometry smoke tests
        run: >
          java -ea
          -cp "target/test-classes:target/classes:lib/josm-tested.jar"
          org.openstreetmap.josm.plugins.roadrailalignment.geometry.GeometrySmokeTest

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: target/RoadRailAlignment.jar
          generate_release_notes: true
